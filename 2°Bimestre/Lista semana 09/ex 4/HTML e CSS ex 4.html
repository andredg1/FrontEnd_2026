<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Infinity Bank</title>

    <style>

        body {
            background-color: #f0f0f0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            text-align: center;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            font-size: 17px;
        }

    </style>
</head>
<body>

    <div class="box">

        <h1>Infinity Bank</h1>
        <input type="number" id="valor" placeholder="Valor da venda">
        <select id="bandeira">
            <option value="visa">Visa</option>
            <option value="master">Master</option>
            <option value="elo">Elo</option>
        </select>

        <input type="number" id="parcelas" placeholder="Quantidade de parcelas">

        <button id="calcular">Calcular</button>

        <p id="resultado"></p>
     </div>
    <script src="script4.js"></script>
</body>
</html>
