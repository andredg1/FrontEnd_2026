<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista VIP</title>

    <style>

        body {
            background-color: #f0f0f0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: white;
            width: 400px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 70%;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #adicionar {
            background-color: green;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .riscado {
            text-decoration: line-through;
            color: gray;
        }

        .btn-concluir {
            background-color: blue;
            color: white;
            margin-left: 10px;
        }

        .btn-editar {
            background-color: orange;
            color: white;
        }

        .btn-excluir {
            background-color: red;
            color: white;
        }

    </style>
</head>
<body>

    <div class="card">

        <h1>Convidados VIP</h1>

        <input type="text" id="nome" placeholder="Digite um nome">

        <button id="adicionar">Adicionar</button>

        <ul id="lista"></ul>

    </div>

   <script src="script5.js"></script>
</body>
</html>
