<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Temperatura</title>

    <style>

        body {
            background-color: #f0f0f0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            margin: 10px;
            padding: 10px;
            width: 200px;
            font-size: 16px;
        }

    </style>
</head>
<body>

    <div class="box">

        <h1>Conversor</h1>

        <p>Celsius</p>
        <input type="number" id="celsius" step="0.1">

        <p>Fahrenheit</p>
        <input type="number" id="fahrenheit" step="0.1">

    </div>

    <script src="script2.js"></script>
</body>
</html>
