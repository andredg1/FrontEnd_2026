<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Crédito para Eventos</title>

    <style>

        body {
            background-color: #f0f0f0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            text-align: left;
            font-size: 17px;
        }

    </style>
</head>
<body>

    <div class="box">

        <h1>Infinity Eventos</h1>

        <select id="pacote">

            <option value="50">Standard</option>

            <option value="80">Premium</option>

            <option value="120">Infinity Deluxe</option>

        </select>

        <input type="number" id="pessoas" placeholder="Quantidade de pessoas">

        <button id="calcular">Calcular Orçamento</button>

        <div id="resultado"></div>

    </div>
    
    <script src="script6.js"></script>

</body>
</html>
