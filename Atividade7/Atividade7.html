<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Pet Virtual</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
</head>

<body class="bg-pink-50 min-h-screen flex flex-col items-center justify-start p-4"
style="
    background-image: url('bg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
">

    <!-- Interface -->
    <div class="w-full flex items-center justify-start gap-4 mb-6">

        <div class="avatar">
            <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                <img src="b_c.png" />
            </div>
        </div>

        <input 
            type="text" 
            placeholder="Nome da criatura..." 
            class="input input-secondary"
        />

    </div>

    <!-- Criatura -->
    <div class="flex flex-col items-center w-full px-4">

        <img 
            id="b"
            src="b_n.png"
            class="w-full max-w-md h-auto"
        />

        <!-- Botão comida -->
        <div class="mt-12 flex justify-center w-full">

            <img 
                id="btn"
                src="btn.png"
                class="w-1/3 max-w-[180px] h-auto active:scale-95 transition"
                onclick="alimentar()"
            />

        </div>
    </div>

    <!-- Botão escondido (extra) -->
    <button style="opacity:0; position:absolute;">
        <img src="b_a.png" width="50">
    </button>

    <script src="script.js"></script>

    <script>
const cria = document.getElementById("b");
const btn = document.getElementById("btn");

const estados = {
    normal:  "b_n.png",
    puto: "b_p.png",
    morto: "b_d.png",
    comendo: "b_c.png",
    alimentado: "b_a.png",
}

let contador = 0; 
let intervalo = null;
let time_click = null;
let time_out = null;

/* =========================
   CONTROLE DE VIDA
========================= */
function controlador (){
    if(intervalo) clearInterval(intervalo)
        
    intervalo = setInterval(() => {
        contador++;

        console.log("tempo:",contador);
        
        if (contador == 30){
            cria.src = estados.puto;
        }

        if(contador == 60){
            cria.src = estados.morto;
        }
    }, 1000);
}

/* =========================
   FUNÇÃO ALIMENTAR
========================= */
function alimentar() {

    cria.src = estados.comendo;
    contador = 0;

    console.log("Comendo");

    if (time_click) clearTimeout(time_click);

    time_click = setTimeout(() => {
        cria.src = estados.alimentado;

        time_out = setTimeout(() => {
            cria.src = estados.normal;
        }, 2000);

    }, 1000);
}

/* =========================
   FUNDO DIA / NOITE
========================= */
const fundoDia = "bg.png";
const fundoNoite = "bg.png"; // (mesma imagem pois não veio outra no zip)
let horas = 0;

function atualizarFundo() {
    if (horas) clearInterval(horas);

    horas = setInterval(() => {
        horas++;
        
        if (horas >= 12) {
            document.body.style.backgroundImage = `url('${fundoNoite}')`;
        } else {
            document.body.style.backgroundImage = `url('${fundoDia}')`;
        }

        if(horas >= 24) horas = 0;

    }, 1000);
}


     controlador();
     atualizarFundo();
    </script>

</body>
</html>
